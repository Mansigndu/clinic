<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Form - Dr. Shailaja Sabnis</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{
--primary:#2A9D8F;
--dark:#1e3a3a;
--light:#F8FAFC;
}

</style>

</head>

<body class="bg-[#F8FAFC] flex justify-center">

<!-- Container -->
<div class="w-full max-w-2xl p-6 md:p-10 bg-white rounded-3xl shadow-xl mt-10 mb-10">

<!-- Doctor Image -->
<div class="flex justify-center mb-6">

<img src="./images/doctor.jpg"
class="rounded-full w-36 h-36 object-cover border-4 border-[var(--primary)] shadow-lg">

</div>


<!-- Heading -->

<h1 class="text-center text-3xl md:text-4xl font-bold text-[var(--dark)] mb-2">
Dr. Shailaja Sabnis
</h1>

<p class="text-center text-gray-500 mb-8 text-lg">
Book Your Appointment
</p>


<form id="appointmentForm" class="space-y-6">


<!-- Name -->
<div>

<label class="block text-[var(--dark)] font-medium mb-1">
Full Name <span class="text-red-500">*</span>
</label>

<input type="text" required
placeholder="Enter your full name"
class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)]">

</div>


<!-- Email -->
<div>

<label class="block text-[var(--dark)] font-medium mb-1">
Email <span class="text-red-500">*</span>
</label>

<input type="email" required
placeholder="Enter your email"
class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)]">

</div>


<!-- Mobile -->
<div>

<label class="block text-[var(--dark)] font-medium mb-1">
Mobile <span class="text-red-500">*</span>
</label>

<input type="tel" required
placeholder="Enter your mobile number"
class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)]">

</div>


<!-- Date -->
<div>

<label class="block text-[var(--dark)] font-medium mb-1">
Preferred Date
</label>

<input type="date"
class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)]">

</div>


<!-- Location -->
<div>

<label class="block text-[var(--dark)] font-medium mb-2">
Preferred Location & Time <span class="text-red-500">*</span>
</label>

<div class="space-y-3">

<label class="flex items-start cursor-pointer">
<input type="radio" name="location" required class="mt-1 mr-3 accent-[var(--primary)]">
<span class="text-gray-700">Sneh Nursing Home, Andheri East (11AM – 2PM)</span>
</label>

<label class="flex items-start cursor-pointer">
<input type="radio" name="location" class="mt-1 mr-3 accent-[var(--primary)]">
<span class="text-gray-700">Nanavati Hospital (Mon, Wed, Sat 3PM – 5PM)</span>
</label>

<label class="flex items-start cursor-pointer">
<input type="radio" name="location" class="mt-1 mr-3 accent-[var(--primary)]">
<span class="text-gray-700">Medico Surgical Clinic, Andheri East (7PM – 9PM)</span>
</label>

</div>

</div>


<!-- Captcha -->
<div class="flex items-center space-x-2">

<input type="checkbox" id="captcha" class="w-5 h-5 accent-[var(--primary)]">

<label class="text-gray-700">I am not a robot</label>

</div>


<!-- Buttons -->
<div class="flex flex-col md:flex-row gap-4 pt-4">

<button type="submit"
class="bg-[var(--primary)] hover:bg-[#23867a] text-white font-semibold py-3 px-6 rounded-lg shadow-md transition">

Submit

</button>

<button type="reset"
class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg transition">

Reset

</button>

</div>

</form>

</div>


<script>

const form=document.getElementById('appointmentForm');

form.addEventListener('submit',function(e){

e.preventDefault();

const captcha=document.getElementById('captcha');

if(!captcha.checked){

alert('Please verify you are not a robot.');

return;

}

alert('Appointment request submitted successfully!');

form.reset();

});

</script>

</body>
</html>
